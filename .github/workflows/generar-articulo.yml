name: Generar Artículo INMOIA

on:
  schedule:
    # Lunes y jueves a las 12:00 UTC (≈ 09:00 Chile)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install anthropic

      - name: Generar artículo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generar_articulo.py
